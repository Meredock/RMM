name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RMM-Agent
    strategy:
      matrix:
        goos: [linux, windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: RMM-Agent/go.mod
      - name: Vet
        run: go vet ./...
        env:
          GOOS: ${{ matrix.goos }}
          CGO_ENABLED: "0"
      - name: Build
        run: go build ./...
        env:
          GOOS: ${{ matrix.goos }}
          CGO_ENABLED: "0"
      - name: Test
        if: matrix.goos == 'linux'
        run: go test ./...

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RMM-Dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: RMM-Dashboard/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
