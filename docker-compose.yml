# Fixsmith RMM — self-hosted stack (dashboard + PostgreSQL + Caddy auto-HTTPS).
# Copy .env.docker.example to .env, fill it in, point your domain's DNS A record
# at this server, then: docker compose up -d --build
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rmm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rmm
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rmm"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ./RMM-Dashboard
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://rmm:${POSTGRES_PASSWORD}@db:5432/rmm
      JWT_SECRET: ${JWT_SECRET}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      AGENT_REGISTRATION_SECRET: ${AGENT_REGISTRATION_SECRET}
      # Optional integrations
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      AGENT_LATEST_VERSION: ${AGENT_LATEST_VERSION:-}
      AGENT_DOWNLOAD_URL_WINDOWS: ${AGENT_DOWNLOAD_URL_WINDOWS:-}
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - dashboard
    ports:
      - "80:80"
      - "443:443"
    environment:
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  db-data:
  caddy-data:
  caddy-config:
