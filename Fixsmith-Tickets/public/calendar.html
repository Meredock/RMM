<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fixsmith Calendar</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="layout">
      <header class="hero">
        <p class="eyebrow">Scheduling</p>
        <h1>Repair Due-Date Calendar</h1>
        <p class="subtitle">View upcoming due dates and create new tickets directly from the calendar.</p>
      </header>

      <nav class="section-nav panel compact">
        <a class="nav-chip link-chip" href="/dashboard">Dashboard</a>
        <a class="nav-chip link-chip" href="/tickets">Tickets</a>
        <a class="nav-chip link-chip" href="/customers">Customers</a>
        <a class="nav-chip link-chip" href="/inventory">Inventory</a>
        <a class="nav-chip link-chip" href="/reports">Reports</a>
        <a class="nav-chip link-chip" href="/invoices">Invoices</a>
      </nav>

      <section class="panel">
        <div class="calendar-toolbar">
          <button type="button" id="calPrevBtn" class="ghost">Previous</button>
          <div class="calendar-title-wrap">
            <button type="button" id="calTitleToggle" class="calendar-title-btn" aria-expanded="false" aria-controls="calJumpPanel">
              <span id="calTitle" class="calendar-title"></span>
            </button>
            <div id="calJumpPanel" class="calendar-jump-panel hidden">
              <div class="calendar-jump">
                <label>Day
                  <select id="calJumpDay"></select>
                </label>
                <label>Month
                  <select id="calJumpMonth"></select>
                </label>
                <label>Year
                  <select id="calJumpYear"></select>
                </label>
                <button type="button" id="calJumpGo" class="ghost">Go to Date</button>
              </div>
            </div>
          </div>
          <button type="button" id="calNextBtn" class="ghost">Next</button>
        </div>
        <div class="calendar-filters">
          <label>Filter Status
            <select id="calFilterStatus">
              <option value="">All statuses</option>
              <option value="new">new</option>
              <option value="in progress">in progress</option>
              <option value="waiting for parts">waiting for parts</option>
              <option value="waiting for customer">waiting for customer</option>
              <option value="customer has replied">customer has replied</option>
            </select>
          </label>
          <label>Filter Customer
            <select id="calFilterCustomer">
              <option value="">All customers</option>
            </select>
          </label>
          <label>Search
            <input id="calFilterSearch" type="search" placeholder="Brand, model, issue" />
          </label>
          <label class="filter-check">
            <input id="calFilterOverdue" type="checkbox" />
            Overdue only
          </label>
          <button type="button" id="calFilterReset" class="ghost">Reset</button>
        </div>
        <div class="calendar-weekdays">
          <span>Sun</span>
          <span>Mon</span>
          <span>Tue</span>
          <span>Wed</span>
          <span>Thu</span>
          <span>Fri</span>
          <span>Sat</span>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Create Ticket From Calendar</h2>
          <span class="calendar-selected-label">Selected date: <strong id="selectedDateLabel">-</strong></span>
        </div>
        <form id="calendarTicketForm" class="ticket-form">
          <label>Customer
            <select name="customerId" id="calendarCustomerSelect" required></select>
          </label>
          <label>Correspondence Email<input name="correspondenceEmail" type="email" required /></label>
          <label>Device Type<input name="deviceType" required /></label>
          <label>Brand<input name="brand" required /></label>
          <label>Model<input name="model" required /></label>
          <label>Due Date<input name="dueDate" type="date" id="calendarDueDate" required /></label>
          <label>Serial Number<input name="serialNumber" /></label>
          <label class="span-2">Issue<textarea name="issue" rows="3" required></textarea></label>
          <label class="span-2">Notes<textarea name="notes" rows="3"></textarea></label>
          <button type="submit">Create Ticket</button>
        </form>
        <p id="calendarMessage" class="message"></p>
      </section>
    </main>

    <script type="module" src="/assets/calendar.js"></script>
  </body>
</html>
