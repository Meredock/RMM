<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fixsmith Dashboard</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="layout">
      <header class="hero">
        <p class="eyebrow">Operations Console</p>
        <h1>Fixsmith Dashboard</h1>
        <p class="subtitle">Monitor workload, inventory pressure, and status distribution.</p>
      </header>

      <nav class="section-nav panel compact">
        <a class="nav-chip link-chip" href="/tickets">Tickets</a>
        <a class="nav-chip link-chip" href="/customers">Customers</a>
        <a class="nav-chip link-chip" href="/inventory">Inventory</a>
        <a class="nav-chip link-chip" href="/calendar">Calendar</a>
        <a class="nav-chip link-chip" href="/reports">Reports</a>
        <a class="nav-chip link-chip" href="/invoices">Invoices</a>
        <button type="button" class="ghost push-right" id="dashboardRefreshBtn">Refresh</button>
      </nav>

      <section class="panel metrics" id="metricsPanel">
        <h2>Live Metrics</h2>
        <div class="metric-grid six-up">
          <article><span class="metric-label">Total Tickets</span><strong id="metricTotal">-</strong></article>
          <article><span class="metric-label">Active</span><strong id="metricActive">-</strong></article>
          <article><span class="metric-label">Waiting For Customer</span><strong id="metricReady">-</strong></article>
          <article><span class="metric-label">Customers</span><strong id="metricCustomers">-</strong></article>
          <article><span class="metric-label">Inventory Items</span><strong id="metricInventory">-</strong></article>
          <article><span class="metric-label">Low Stock</span><strong id="metricLowStock">-</strong></article>
        </div>
        <ul class="status-breakdown" id="statusBreakdown"></ul>
      </section>
    </main>

    <script type="module" src="/assets/dashboard.js"></script>
  </body>
</html>
